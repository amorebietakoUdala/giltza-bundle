services:
    _defaults:
        # automatically injects dependencies in your services
        autowire: true
        # automatically registers your services as commands, event subscribers, etc.
        autoconfigure: true
        # this means you cannot fetch services directly from the container via $container->get()
        # if you need to do this, you can override this setting on individual services
        public: false

    AMREU\GiltzaBundle\:
        resource: '../../*'
        exclude:
            - '../../Resources/'
            - '../../DependencyInjection/'
            - '../../GiltzaBundle.php'

    AMREU\GiltzaBundle\Controller\GiltzaController:
        class: AMREU\GiltzaBundle\Controller\GiltzaController
        tags: ['controller.service_arguments']
        arguments: ['@AMREU\GiltzaBundle\Service\GiltzaProvider', '$options']
            

    AMREU\GiltzaBundle\Service\GiltzaProvider:
        class: AMREU\GiltzaBundle\Service\GiltzaProvider
        arguments: ['@router', '$options']
            
